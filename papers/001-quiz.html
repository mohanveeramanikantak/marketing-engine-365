<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 001 Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    padding:20px;
}

.quiz-container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
}

.question{
    margin-bottom:25px;
    padding:15px;
    border-radius:10px;
    background:#f5f7fa;
}

label{
    display:block;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

label:hover{
    background:#e3f2fd;
}

.correct{
    background:#c8f7c5 !important;
    border:2px solid green;
}

.wrong{
    background:#ffcdd2 !important;
    border:2px solid red;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#2196f3;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>📘 Day 001 – Introduction to Marketing Quiz</h1>

<div class="question">
<h2>1. Marketing mainly focuses on:</h2>

<label id="q1a"><input type="radio" name="q1" value="a"> Selling</label>
<label id="q1b"><input type="radio" name="q1" value="b"> Customer needs</label>
<label id="q1c"><input type="radio" name="q1" value="c"> Profit only</label>
<label id="q1d"><input type="radio" name="q1" value="d"> Production</label>
</div>

<div class="question">
<h2>2. Marketing begins with:</h2>

<label id="q2a"><input type="radio" name="q2" value="a"> Selling</label>
<label id="q2b"><input type="radio" name="q2" value="b"> Advertising</label>
<label id="q2c"><input type="radio" name="q2" value="c"> Customer needs</label>
<label id="q2d"><input type="radio" name="q2" value="d"> Distribution</label>
</div>

<div class="question">
<h2>3. Which is a core concept of marketing?</h2>

<label id="q3a"><input type="radio" name="q3" value="a"> Cost</label>
<label id="q3b"><input type="radio" name="q3" value="b"> Need</label>
<label id="q3c"><input type="radio" name="q3" value="c"> Factory</label>
<label id="q3d"><input type="radio" name="q3" value="d"> Supply</label>
</div>

<div class="question">
<h2>4. Marketing is:</h2>

<label id="q4a"><input type="radio" name="q4" value="a"> Product-oriented</label>
<label id="q4b"><input type="radio" name="q4" value="b"> Customer-oriented</label>
<label id="q4c"><input type="radio" name="q4" value="c"> Sales-oriented</label>
<label id="q4d"><input type="radio" name="q4" value="d"> Profit-oriented</label>
</div>

<div class="question">
<h2>5. Exchange is:</h2>

<label id="q5a"><input type="radio" name="q5" value="a"> Buying only</label>
<label id="q5b"><input type="radio" name="q5" value="b"> Selling only</label>
<label id="q5c"><input type="radio" name="q5" value="c"> Giving & receiving value</label>
<label id="q5d"><input type="radio" name="q5" value="d"> Advertising</label>
</div>

<button onclick="checkAnswers()">✅ Verify Answers</button>

<h2 id="result"></h2>

</div>

<script>

const answers = {
    q1: "b",
    q2: "c",
    q3: "b",
    q4: "b",
    q5: "c"
};

function checkAnswers(){

    let score = 0;

    for(let q in answers){

        let selected = document.querySelector(`input[name="${q}"]:checked`);

        // Show correct answer
        document.getElementById(q + answers[q]).classList.add("correct");

        if(selected){

            if(selected.value === answers[q]){
                score++;
            }
            else{
                document.getElementById(q + selected.value).classList.add("wrong");
            }
        }
    }

    let total = Object.keys(answers).length;

    document.getElementById("result").innerHTML =
    `🎯 You scored ${score} / ${total}`;

    // Save score locally
    localStorage.setItem("marketingQuizScore", score);
}

</script>

</body>
</html>
