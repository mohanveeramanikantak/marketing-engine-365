<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 001 Quiz</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .quiz-container{
        background:white;
        width:100%;
        max-width:700px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease;
    }

    h1{
        text-align:center;
        margin-bottom:25px;
        color:#333;
        font-size:2rem;
    }

    .question{
        margin-bottom:25px;
        padding:20px;
        border-radius:15px;
        background:#f7f9fc;
        transition:0.3s;
    }

    .question:hover{
        transform:translateY(-3px);
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .question h2{
        margin-bottom:15px;
        color:#444;
        font-size:1.1rem;
    }

    label{
        display:block;
        padding:10px;
        margin-bottom:10px;
        border-radius:10px;
        background:#fff;
        cursor:pointer;
        transition:0.3s;
        border:2px solid transparent;
    }

    label:hover{
        background:#e8f4ff;
        border-color:#4facfe;
    }

    input[type="radio"]{
        margin-right:10px;
    }

    button{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;
        font-size:1rem;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.02);
        opacity:0.9;
    }

    #result{
        margin-top:20px;
        text-align:center;
        color:#222;
        font-size:1.5rem;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    @media(max-width:600px){
        h1{
            font-size:1.5rem;
        }

        .question h2{
            font-size:1rem;
        }

        button{
            font-size:0.9rem;
        }
    }
</style>
</head>

<body>

<div class="quiz-container">

<h1>📘 Day 001 – Introduction to Marketing Quiz</h1>

<div class="question">
<h2>1. Marketing mainly focuses on:</h2>

<label><input type="radio" name="q1" value="a"> Selling</label>
<label><input type="radio" name="q1" value="b"> Customer needs</label>
<label><input type="radio" name="q1" value="c"> Profit only</label>
<label><input type="radio" name="q1" value="d"> Production</label>
</div>

<div class="question">
<h2>2. Marketing begins with:</h2>

<label><input type="radio" name="q2" value="a"> Selling</label>
<label><input type="radio" name="q2" value="b"> Advertising</label>
<label><input type="radio" name="q2" value="c"> Customer needs</label>
<label><input type="radio" name="q2" value="d"> Distribution</label>
</div>

<div class="question">
<h2>3. Which is a core concept of marketing?</h2>

<label><input type="radio" name="q3" value="a"> Cost</label>
<label><input type="radio" name="q3" value="b"> Need</label>
<label><input type="radio" name="q3" value="c"> Factory</label>
<label><input type="radio" name="q3" value="d"> Supply</label>
</div>

<div class="question">
<h2>4. Marketing is:</h2>

<label><input type="radio" name="q4" value="a"> Product-oriented</label>
<label><input type="radio" name="q4" value="b"> Customer-oriented</label>
<label><input type="radio" name="q4" value="c"> Sales-oriented</label>
<label><input type="radio" name="q4" value="d"> Profit-oriented</label>
</div>

<div class="question">
<h2>5. Exchange is:</h2>

<label><input type="radio" name="q5" value="a"> Buying only</label>
<label><input type="radio" name="q5" value="b"> Selling only</label>
<label><input type="radio" name="q5" value="c"> Giving & receiving value</label>
<label><input type="radio" name="q5" value="d"> Advertising</label>
</div>

<button onclick="checkAnswers()">✅ Verify Answers</button>

<h2 id="result"></h2>

</div>

<script>

const answers = {
    q1: "b",
    q2: "c",
    q3: "b",
    q4: "b",
    q5: "c"
};

function checkAnswers() {

    let score = 0;
    let total = Object.keys(answers).length;

    for (let q in answers) {

        let selected = document.querySelector(`input[name="${q}"]:checked`);

        if(selected && selected.value === answers[q]) {
            score++;
        }
    }

    let result = document.getElementById("result");

    result.innerHTML = `🎯 You scored ${score} / ${total}`;

    if(score === total){
        result.style.color = "green";
        result.innerHTML += "<br>🏆 Excellent!";
    }
    else if(score >= 3){
        result.style.color = "orange";
        result.innerHTML += "<br>👍 Good Job!";
    }
    else{
        result.style.color = "red";
        result.innerHTML += "<br>📚 Keep Practicing!";
    }
}

</script>

</body>
</html>
